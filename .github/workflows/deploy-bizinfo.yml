name: Deploy bizinfo to Azure Functions

on:
  push:
    branches:
      - main
    paths:
      - "bizinfo/**"
      - "common/**"
      - ".github/workflows/deploy-bizinfo.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r bizinfo/* deploy/
          cp -r common deploy/common

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4

      - name: Deploy to Azure Functions
        run: |
          cd deploy
          func azure functionapp publish ${{ vars.AZURE_FUNCTION_APP_NAME }} --python
